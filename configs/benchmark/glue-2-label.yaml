# @package _global_
benchmark:
  name: glue_2_label
  description: "Subset of 2 label datasets from the GLUE dataset"

  # Tasks to evaluate (MUST be in alphabetical order — all methods use sorted(task_names) internally)
  tasks:
    - cola
    - mrpc
    - qnli
    - sst2

  # Preference vectors to test (must sum to 1.0; indices match SORTED task order above)
  # Index mapping: 0=cola, 1=mrpc, 2=qnli, 3=sst2
  preference_vectors:
    # Equal preference
    - [0.25, 0.25, 0.25, 0.25]
    # Focus on each task individually
    - [0.7, 0.1, 0.1, 0.1]   # cola
    - [0.1, 0.1, 0.7, 0.1]   # qnli
    - [0.1, 0.7, 0.1, 0.1]   # mrpc
    - [0.1, 0.1, 0.1, 0.7]   # sst2
    # Balanced pairs
    - [0.4, 0.1, 0.4, 0.1]   # cola + qnli
    - [0.1, 0.4, 0.1, 0.4]   # mrpc + sst2

  # Evaluation settings
  evaluation:
    batch_size: 32
    num_samples: null  # null = use full dataset, integer = limit samples
    reference_num_samples: null  # null = use full reference split for utopia/nadir computation
    metrics:
      - name: accuracy
        plots: all                          # generate all available plot types
      - name: f1_macro
        plots:                              # generate specific plots only
          - heatmap
          - parallel_coordinates
          - distance_to_utopia
          - performance_recovery
          - pareto_frontiers
          - normalized_skill_retention
          - normalized_pareto_frontiers
      - name: f1_weighted
        plots: []                           # compute metric, no plots
      - name: f1_micro
        plots: []
      - name: precision_macro
        plots: []
      - name: recall_macro
        plots: []
      - name: cohen_kappa
        plots: []
      - name: mcc                           # Matthews Correlation Coefficient
        plots:
          - heatmap
          - distance_to_utopia
    # Cross-metric plots (involving multiple metrics simultaneously).
    # Currently no built-in types; add entries here when new types are implemented.
    cross_metric_plots: []

  # Execution mode (3 options):
  # - train_eval: Train & cache & evaluate & cache; reuse cached models if they exist (DEFAULT)
  #               With cache enabled, this will reuse cached evaluations and only regenerate visualizations
  # - train_only: Train & cache; skip evaluation, skip if cached model exists
  # - eval_only: Evaluate & cache only; require cached models (fail if missing)
  #
  # NOTE: To regenerate visualizations from cached results without re-running evaluation:
  #       Use mode=train_eval with cache_enabled=true (default). The evaluation cache will be
  #       reused, and only visualizations will be regenerated. This is much faster than eval_only.
  #
  # Override cache behavior:
  # - benchmark.force_retrain=true: Ignore cached models, always retrain
  # - benchmark.clear_cache=true: Clear all caches before starting
  mode: train_eval

  # Caching (enabled by default, disable with benchmark.cache_enabled=false)
  cache_enabled: true
  force_retrain: false  # Override: ignore cached models, always retrain
  clear_cache: false    # Override: clear all caches before starting
