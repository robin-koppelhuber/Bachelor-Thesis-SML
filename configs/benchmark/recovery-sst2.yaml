# @package _global_
benchmark:
  name: recovery_sst2
  description: "Single-task recovery ablation: SST-2 only. Verifies Chebyshev/EPO can match textattack fine-tuned quality."

  tasks:
    - sst2

  preference_vectors:
    - [1.0]

  evaluation:
    batch_size: 32
    num_samples: null
    reference_num_samples: null
    metrics:
      - name: accuracy
        plots: []
      - name: f1_macro
        plots: []
      - name: cohen_kappa
        plots: []
      - name: mcc
        plots: []
    cross_metric_plots: []

  mode: train_eval
  cache_enabled: true
  force_retrain: false
  clear_cache: false
