# @package _global_
# Recovery ablation: hyperparameters matched to textattack single-task fine-tuning.
# CoLA: lr=2e-5, batch=32, epochs=5 (source: HF model card)
# MRPC: lr=3e-5, batch=16, epochs=5 (source: HF model card) — using 2e-5/32 as unified setting
# QNLI/SST-2: no public card — using same unified setting
method:
  name: chebyshev
  params:
    learning_rate: 2e-5
    num_epochs: 5
    batch_size: 32
    gradient_accumulation_steps: 1
    warmup_steps: 0        # textattack does not specify; use 0 for clean comparison
    weight_decay: 0.0      # textattack does not specify; use 0 for clean comparison
    use_augmented: true
    epsilon: 0.001
    normalize_preferences: true
    utopia_point: null
    nadir_point: null
    max_grad_norm: 1.0
    use_fp16: false
    use_torch_compile: false
    use_gradient_checkpointing: false
    use_streaming: false   # single-task dataset fits in memory
    dataloader_num_workers: 0
    save_epoch_checkpoints: true
    auto_resume: true
    keep_all_epoch_checkpoints: false
    max_samples_per_task: null
    separate_heads: true  # Use T task-specific classification heads
