# @package _global_
method:
  name: layerwise_self_position
  params:
    # Adam LR on mixing logits β.
    # Layer-wise β has L×T params (L≈14 for RoBERTa-base); Adam adapts per-param,
    # so the same lr as global Self Position works well as a starting point.
    lr_alpha: 5.0e-3

    # Enable per-layer mixing: β ∈ R^{L×T}
    layerwise: true

    # Training settings
    num_epochs: 5
    batch_size: 32

    # TIES preprocessing (optional): apply trim + global sign + disjoint mask
    # to task vectors before optimization. All steps are α-independent.
    ties_preprocessing: false
    ties_k: 0.2              # Top-k fraction to keep during trimming

    # Augmented Chebyshev scalarization (mirrors chebyshev_ft.py)
    # combined_loss = max_k{r_k · L̃_k} + epsilon · Σ_k{r_k · L̃_k}
    # where L̃_k = (L_k − utopia_k) / (nadir_k − utopia_k)
    epsilon: 0.001
    use_augmented: true

    # Preference convention: false = high r_k means more important task k
    invert_preference: false

    # Mixed precision: autocast for forward (memory), unscaled backward (correctness)
    use_fp16: true

    # Model optimizer settings (created by base class but never stepped)
    learning_rate: 1.0e-5    # Unused (model params are never gradient-updated)
    weight_decay: 0.0
    max_grad_norm: 0.0
    gradient_accumulation_steps: 1

    # Disable torch.compile (Self Position reconstructs params in-place each step)
    use_torch_compile: false

    # Memory optimization
    max_samples_per_task: 6000
    dataloader_num_workers: 0
    use_streaming: false

    # Checkpoint management
    save_epoch_checkpoints: false
    auto_resume: true
    keep_all_epoch_checkpoints: false

    # Early stopping
    early_stopping: true
    patience: 2
