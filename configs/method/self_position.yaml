# @package _global_
method:
  name: self_position
  params:
    # Adam LR on mixing logits β (matches paper arXiv:2410.15035)
    lr_alpha: 5.0e-3

    # Layer-wise mixing: if true, β ∈ R^{L×T} (one softmax per layer group).
    # See layerwise_self_position.yaml for the layer-wise variant.
    layerwise: false

    # Training settings
    num_epochs: 5            # β has only T params; Adam at lr=5e-3 converges in ~1-2 epochs; early stopping provides safety net
    batch_size: 32

    # TIES preprocessing (optional): apply trim + global sign + disjoint mask
    # to task vectors before optimization. All steps are α-independent.
    ties_preprocessing: false
    ties_k: 0.2              # Top-k fraction to keep during trimming

    # Augmented Chebyshev scalarization (mirrors chebyshev_ft.py)
    # combined_loss = max_k{r_k · L̃_k} + epsilon · Σ_k{r_k · L̃_k}
    # where L̃_k = (L_k − utopia_k) / (nadir_k − utopia_k)
    epsilon: 0.001
    use_augmented: true

    # Preference convention: false = high r_k means more important task k
    invert_preference: false

    # Mixed precision: autocast for forward (memory), unscaled backward (correctness)
    use_fp16: true

    # Model optimizer settings (created by base class but never stepped)
    learning_rate: 1.0e-5    # Unused (model params are never gradient-updated)
    weight_decay: 0.0
    max_grad_norm: 0.0
    gradient_accumulation_steps: 1

    # Disable torch.compile (Self Position reconstructs params in-place each step;
    # compile does not help and may conflict with dynamic param assignment)
    use_torch_compile: false
    use_gradient_checkpointing: false

    # Memory optimization
    max_samples_per_task: 6000  # ~187 steps/epoch at bs=32; covers CoLA/MRPC fully, ~35%/54% of QNLI/SST2 over 6 epochs
    dataloader_num_workers: 0
    use_streaming: false

    # Checkpoint management
    save_epoch_checkpoints: false
    auto_resume: true
    keep_all_epoch_checkpoints: false

    # Early stopping
    early_stopping: true
    patience: 2        # Epochs without improvement before stopping
