# @package _global_
method:
  name: epo
  class_path: src.methods.epo_search.EPOSearch
  description: "Exact Pareto Optimization (EPO) search"

  # EPO-specific parameters
  params:
    # Training settings
    learning_rate: 2e-5
    num_epochs: 6
    batch_size: 32
    warmup_steps: 100
    weight_decay: 0.01

    # EPO settings
    solver: quadprog  # quadprog, cvxpy, scipy
    n_tasks: 4  # Number of tasks (overridden by benchmark config)

    # Preference handling
    use_preferences: true
    normalize_preferences: true

    # MGDA settings
    normalization_type: loss  # loss, loss+, none
    update_weights_every: 1  # Update task weights every N steps

    # Optimization
    gradient_accumulation_steps: 1
    max_grad_norm: 1.0

    # Memory optimization — EPO stores per-task gradients (~4×125MB); offload to CPU to avoid OOM
    cpu_gradient_offload: true
    use_fp16: true   # Mixed precision training (~1.5-2× speedup; <0.1 pp accuracy loss on GLUE)
    dataloader_num_workers: 0
    max_samples_per_task: 6000  # ~187 steps/epoch at bs=32; covers CoLA/MRPC fully, ~35%/54% of QNLI/SST2 over 6 epochs
    use_streaming: false

    # Performance optimization
    use_torch_compile: false

    # Checkpoint management
    save_epoch_checkpoints: false
    auto_resume: true
    keep_all_epoch_checkpoints: false

    # Early stopping
    early_stopping: true
    patience: 2        # Epochs without improvement before stopping
