# @package _global_
method:
  name: epo
  class_path: src.methods.epo_search.EPOFineTuning
  description: "Exact Pareto Optimization (EPO) fine-tuning"

  # EPO-specific parameters
  params:
    # Training settings
    learning_rate: 2e-5
    num_epochs: 6
    batch_size: 32
    warmup_steps: 100
    weight_decay: 0.01

    # EPO algorithm settings
    # normalize_gradients=true: LP / MGDA uses unit-norm per-task gradients for scale-invariant
    #   preference alignment.  The combined gradient is also built from the normalised vectors,
    #   so the LP solution and the applied update are fully consistent.
    normalize_gradients: true
    pref_eps: 0.001      # LP t > pref_eps required to use LP result; else fall back to MGDA
    invert_preference: false  # Set true to use paper's original L∝r convention (ablation only)

    # Preference handling (BaseTrainingMethod)
    normalize_preferences: true

    # Optimization
    gradient_accumulation_steps: 1
    max_grad_norm: 1.0

    # Memory optimization — EPO stores per-task gradients (~4×125MB).
    # false (default): keep gradients on GPU; Gram matrix + combined gradient computed with
    #   cuBLAS — eliminates ~2 GB PCIe transfer per step (~3-4 min saved over a full benchmark).
    #   Requires ~5.3 GB VRAM (RoBERTa-base, T=4, bs=32).
    # true: offload each gradient to CPU immediately after backward — caps GPU overhead to
    #   one backward pass at a time; use on GPUs with <8 GB VRAM.
    cpu_gradient_offload: false
    use_fp16: true   # Mixed precision training (~1.5-2× speedup; <0.1 pp accuracy loss on GLUE)
    dataloader_num_workers: 0
    max_samples_per_task: 6000  # ~187 steps/epoch at bs=32; covers CoLA/MRPC fully, ~35%/54% of QNLI/SST2 over 6 epochs
    use_streaming: false

    # Performance optimization
    # torch.compile works well for EPO: forward+backward are standard transformer ops.
    # Disabled for Self Position (in-place p.data reconstruction breaks compiled graphs).
    use_torch_compile: true
    use_gradient_checkpointing: false

    # Checkpoint management
    save_epoch_checkpoints: false
    auto_resume: true
    keep_all_epoch_checkpoints: false

    # Early stopping
    early_stopping: true
    patience: 2        # Epochs without improvement before stopping

    # Architecture
    separate_heads: true  # Use T task-specific classification heads (recommended)
