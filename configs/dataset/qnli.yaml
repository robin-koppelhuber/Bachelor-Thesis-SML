# @package _global_.datasets.qnli
name: qnli
display_name: "QNLI"
task_type: classification
num_labels: 2

# HuggingFace dataset
hf_dataset:
  path: nyu-mll/glue # ~116k samples
  subset: qnli
  split:
    train: train
    validation: validation
    test: validation  # GLUE QNLI has no held-out test labels; use validation as test

# Fine-tuned model checkpoint
finetuned_checkpoint: textattack/roberta-base-QNLI

# Preprocessing
preprocessing:
  text_column: question
  text_column_2: sentence
  label_column: label
  max_length: 512
  truncation: true
  padding: max_length

