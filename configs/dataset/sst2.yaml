# @package _global_.datasets.sst2
name: sst2
display_name: "SST-2"
task_type: classification
num_labels: 2

# HuggingFace dataset
hf_dataset:
  path: nyu-mll/glue # ~70k samples
  subset: sst2
  split:
    train: train
    validation: validation
    test: validation  # GLUE SST-2 has no held-out test labels; use validation as test

# Fine-tuned model checkpoint
finetuned_checkpoint: textattack/roberta-base-SST-2

# Preprocessing
preprocessing:
  text_column: sentence  # single-sentence sentiment task
  label_column: label
  max_length: 512
  truncation: true
  padding: max_length

