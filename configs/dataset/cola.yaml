# @package _global_.datasets.cola
name: cola
display_name: "CoLA"
task_type: classification
num_labels: 2

# HuggingFace dataset
hf_dataset:
  path: nyu-mll/glue # ~10.7k samples
  subset: cola
  split:
    train: train
    validation: validation
    test: validation  # GLUE CoLA has no held-out test labels; use validation as test

# Fine-tuned model checkpoint
finetuned_checkpoint: textattack/roberta-base-CoLA

# Preprocessing
preprocessing:
  text_column: sentence  # single-sentence acceptability task
  label_column: label
  max_length: 512
  truncation: true
  padding: max_length

